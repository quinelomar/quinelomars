<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIFA MUNDIAL - QUINIELOMAR'S</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<style>
body {
    background-image: url('cielo 1.jpeg');
    background-size: cover;
    margin: 0;
    font-family: Arial;
}
.container {
    background: rgba(255,255,255,0.9);
    margin: 20px;
    padding: 15px;
    border-radius: 10px;
}
h1 { text-align:center; font-family:'Anton'; }

.grid {
    display: grid;
    grid-template-columns: repeat(10,1fr);
    gap: 8px;
}
.numero {
    background:#222;
    color:white;
    padding:15px;
    text-align:center;
    border-radius:8px;
    cursor:pointer;
    font-size:12px;
}
.numero.vendido {
    background:#e53935;
}

.btn {
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin:5px;
}

.btn-admin { background:#333; color:white; }
.btn-rifa { background:#fbbc04; }

</style>
</head>
<body>

<div class="container">
<h1>🎟️ RIFA MUNDIAL ESPAÑA VS URUGUAY </h1>

<div id="grid" class="grid"></div>

<h3>Otras Rifas</h3>
<button class="btn btn-rifa" onclick="ir('rifa2.html')">Rifa 2</button>
<button class="btn btn-rifa" onclick="ir('rifa3.html')">Rifa 3</button>
<button class="btn btn-rifa" onclick="ir('rifa4.html')">Rifa 4</button>
<button class="btn btn-rifa" onclick="ir('rifa5.html')">Rifa 5</button>

<br><br>
<button class="btn btn-admin" onclick="loginAdmin()">Admin / Ruleta</button>

</div>

<script>
let key = 'rifa1';
let boletos = JSON.parse(localStorage.getItem(key)) || Array(200).fill(null);

function render(){
    let grid = document.getElementById('grid');
    grid.innerHTML='';
    boletos.forEach((n,i)=>{
        let div = document.createElement('div');
        div.className = 'numero ' + (n ? 'vendido':'');
        div.innerHTML = `<strong>${i+1}</strong><br>${n || ''}`;
        div.onclick = ()=>comprar(i);
        grid.appendChild(div);
    });
}

function comprar(i){
    if(boletos[i]) return alert('Ya vendido');
    let nombre = prompt('Nombre del comprador');
    if(!nombre) return;
    boletos[i] = nombre;
    localStorage.setItem(key, JSON.stringify(boletos));
    render();
}

function loginAdmin(){
    let pass = prompt('Contraseña');
    if(pass==='1234') window.location='admin.html';
    else alert('Incorrecta');
}

function ir(p){ window.location=p; }

render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta</title>
<style>
body{ background:#111; color:white; text-align:center; }
canvas{ background:white; border-radius:50%; }
</style>
</head>
<body>
<h1>🎰 SORTEO</h1>
<canvas id="ruleta" width="400" height="400"></canvas>
<br><br>
<button onclick="girar()">Girar</button>

<script>
let data = JSON.parse(localStorage.getItem('rifa1')) || [];
let participantes = data.map((n,i)=> n?{n,i}:null).filter(Boolean);

let c = document.getElementById('ruleta');
let ctx = c.getContext('2d');

function draw(){
 let ang = 2*Math.PI/participantes.length;
 participantes.forEach((p,i)=>{
  ctx.beginPath();
  ctx.moveTo(200,200);
  ctx.arc(200,200,200,i*ang,(i+1)*ang);
  ctx.fillStyle = i%2?'#f44336':'#2196f3';
  ctx.fill();
 });
}

draw();

function girar(){
 let g = participantes[Math.floor(Math.random()*participantes.length)];
 alert('Ganador: '+g.n+' - Boleto '+(g.i+1));
}
</script>

</body>
</html>
